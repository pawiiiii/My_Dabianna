<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Journey For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow:hidden;
}

.section{
    display:none;
    height:100vh;
    width:100vw;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:30px;
}

.active{
    display:flex;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:#ff4d8d;
    color:white;
    font-size:1rem;
}

button:hover{
    transform:scale(1.05);
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:20px;
    max-width:700px;
}

img{
    width:250px;
    border-radius:20px;
    margin:20px 0;
}

.envelopes{
    display:flex;
    gap:20px;
    margin-top:30px;
}

.envelope{
    font-size:70px;
    cursor:pointer;
    transition:.3s;
}

.envelope:hover{
    transform:translateY(-10px);
}

#message{
    margin-top:20px;
    font-size:1.1rem;
    color:#ffc6db;
}

#typewriter{
    max-width:700px;
    line-height:1.8;
}

.final-buttons{
    display:flex;
    gap:20px;
}

#noBtn{
    position:relative;
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- INTRO -->
<section class="section active" id="intro">
    <div class="card">
        <h1>I Made Something For You ❤️</h1>
        <p style="margin-top:15px">
            This isn't just a website.
            It's a little journey.
        </p>
        <button onclick="nextSection('memory1')">Start</button>
    </div>
</section>

<!-- MEMORY -->
<section class="section" id="memory1">
    <div class="card">
        <h2>Chapter 1</h2>

        <img src="https://picsum.photos/400/300" alt="photo">

        <p>
            This is where I'd put one of our favorite pictures together.
        </p>

        <button onclick="nextSection('hunt')">
            Continue →
        </button>
    </div>
</section>

<!-- HUNT -->
<section class="section" id="hunt">
    <div class="card">
        <h2>Find The Special Letter ✉️</h2>

        <div class="envelopes">
            <div class="envelope" onclick="wrong()">📩</div>
            <div class="envelope" onclick="correct()">💌</div>
            <div class="envelope" onclick="wrong()">📩</div>
        </div>

        <div id="message"></div>
    </div>
</section>

<!-- LETTER -->
<section class="section" id="letter">
    <div class="card">
        <h2>A Letter For You ❤️</h2>

        <p id="typewriter"></p>

        <button onclick="nextSection('final')">
            Continue
        </button>
    </div>
</section>

<!-- FINAL -->
<section class="section" id="final">
    <div class="card">
        <h1>One Last Thing...</h1>

        <img src="https://picsum.photos/500/350" alt="photo">

        <p style="margin:20px 0;">
            Every memory brought me here.
        </p>

        <h2>Will You Be My Girlfriend? ❤️</h2>

        <div class="final-buttons">
            <button onclick="yes()">YES 💖</button>
            <button id="noBtn">NO 😭</button>
        </div>
    </div>
</section>

<script>

// stars
for(let i=0;i<120;i++){
    let star=document.createElement("div");
    star.classList.add("star");

    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";

    document.getElementById("stars").appendChild(star);
}

function nextSection(id){
    document.querySelectorAll(".section")
    .forEach(sec=>sec.classList.remove("active"));

    document.getElementById(id)
    .classList.add("active");
}

function wrong(){
    document.getElementById("message")
    .innerText="Not this one 😜 Try again!";
}

function correct(){
    document.getElementById("message")
    .innerText="You found it! ❤️";

    setTimeout(()=>{
        nextSection("letter");
        typeWriter();
    },1000);
}

const text =
"Thank you for every smile, every conversation, every memory we've shared. Every day with you has become one of my favorite days. Before this journey ends, there's something I've wanted to ask you...";

let i=0;

function typeWriter(){
    const el=document.getElementById("typewriter");

    const interval=setInterval(()=>{
        if(i < text.length){
            el.innerHTML += text.charAt(i);
            i++;
        }else{
            clearInterval(interval);
        }
    },40);
}

function yes(){
    document.body.innerHTML=`
    <div style="
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f172a;
    color:white;
    flex-direction:column;
    text-align:center;">
    
    <h1>AAAAAAAAAA ❤️❤️❤️</h1>
    <h2>You Just Made Me The Happiest Person Alive 😭</h2>

    </div>
    `;
}

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    const x=Math.random()*300-150;
    const y=Math.random()*200-100;

    noBtn.style.transform=
    `translate(${x}px, ${y}px)`;
});

</script>

</body>
</html>
